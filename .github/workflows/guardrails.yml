name: Guardrails

on:
  pull_request:

jobs:
  handoff-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enforce handoff update
        run: node scripts/check-handoff-update.mjs
